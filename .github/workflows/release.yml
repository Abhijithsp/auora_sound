name: Flutter Build Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-increment Version
        id: version_bump
        if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/')
        run: |
          version_line=$(grep '^version: ' pubspec.yaml)
          version_full=$(echo "$version_line" | cut -d' ' -f2)
          version_name=$(echo "$version_full" | cut -d'+' -f1)
          build_num=$(echo "$version_full" | cut -d'+' -f2)
          
          IFS='.' read -r major minor patch <<< "$version_name"
          new_patch=$((patch + 1))
          new_build=$((build_num + 1))
          new_version="${major}.${minor}.${new_patch}+${new_build}"
          
          echo "Bumping version from $version_full to $new_version"
          sed -i "s/^version: .*/version: $new_version/" pubspec.yaml
          
          echo "new_version=v${major}.${minor}.${new_patch}" >> $GITHUB_OUTPUT
          echo "new_build=${new_build}" >> $GITHUB_OUTPUT

      - name: Commit and Push Version Bump
        if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.version_bump.outputs.new_version }}+${{ steps.version_bump.outputs.new_build }} [skip ci]"
          git push

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Decode Android Keystore
        if: github.event_name != 'pull_request'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not set in secrets. Skipping keystore decoding and release signing."
          else
            # Strip spaces, carriage returns, and newlines before decoding to avoid corruption
            echo "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n[:space:]' | base64 --decode > android/app/release.jks
            if [ ! -s android/app/release.jks ]; then
              echo "::error::Decoded keystore file is empty or corrupted!"
              exit 1
            fi
            echo "Keystore successfully decoded and validated."
          fi

      - name: Create key.properties
        if: github.event_name != 'pull_request'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not set in secrets. Skipping key.properties generation."
          else
            echo "storePassword=$KEY_STORE_PASSWORD" > android/key.properties
            echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
            echo "keyAlias=$ALIAS" >> android/key.properties
            echo "storeFile=release.jks" >> android/key.properties
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AppBundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Determine Release Settings
        id: release_settings
        if: github.event_name != 'pull_request'
        env:
          NEW_VERSION: ${{ steps.version_bump.outputs.new_version }}
          NEW_BUILD: ${{ steps.version_bump.outputs.new_build }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            if [[ "$TAG_NAME" == *"beta"* ]]; then
              echo "prerelease=true" >> $GITHUB_OUTPUT
              echo "release_name=Beta $TAG_NAME" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
              echo "release_name=Release $TAG_NAME" >> $GITHUB_OUTPUT
            fi
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "release_name=Build $NEW_VERSION+$NEW_BUILD" >> $GITHUB_OUTPUT
            echo "tag_name=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'pull_request'
        with:
          tag_name: ${{ steps.release_settings.outputs.tag_name }}
          name: ${{ steps.release_settings.outputs.release_name }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: ${{ steps.release_settings.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
